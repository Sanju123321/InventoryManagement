<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 265" role="img" aria-label="Kemtex - Your Quality. Our Obsession">
  <title>Kemtex Management System</title>
  <defs>
    <clipPath id="ovalClip">
      <ellipse cx="220" cy="132" rx="196" ry="114"/>
    </clipPath>
  </defs>

  <!-- Outer dark border ring -->
  <ellipse cx="220" cy="132" rx="210" ry="128" fill="#1C1C1B"/>
  <!-- Yellow fill -->
  <ellipse cx="220" cy="132" rx="206" ry="124" fill="#F5C800"/>
  <!-- White inner ring -->
  <ellipse cx="220" cy="132" rx="200" ry="118" fill="none" stroke="white" stroke-width="5"/>
  <!-- Inner dark ring -->
  <ellipse cx="220" cy="132" rx="196" ry="114" fill="none" stroke="#1C1C1B" stroke-width="1.5"/>

  <!-- Gear white background circle — pushed to upper-right, clipped inside oval -->
  <circle cx="352" cy="105" r="62" fill="white" clip-path="url(#ovalClip)"/>

  <!-- 20 fan blades centred on gear circle, clipped inside oval -->
  <g transform="translate(352,105)" clip-path="url(#ovalClip)">
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(0)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(18)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(36)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(54)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(72)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(90)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(108)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(126)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(144)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(162)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(180)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(198)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(216)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(234)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(252)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(270)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(288)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(306)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(324)"/>
    <path d="M-4,-10 L-3,-58 L3,-58 L4,-10 Z" fill="#1C1C1B" transform="rotate(342)"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="11" fill="white"/>
    <circle cx="0" cy="0" r="4"  fill="#1C1C1B"/>
  </g>
  <!-- Gear border ring -->
  <circle cx="352" cy="105" r="60" fill="none" stroke="#1C1C1B" stroke-width="2" clip-path="url(#ovalClip)"/>

  <!-- TM mark (top-right of gear) -->
  <text x="322" y="52" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#1C1C1B">TM</text>

  <!-- KEMTEX: centred in left column (x≈148, clear of gear which starts at x≈290) -->
  <text
    x="148" y="150"
    text-anchor="middle"
    font-family="'Arial Black','Franklin Gothic Heavy',Impact,Arial,sans-serif"
    font-size="52" font-weight="900"
    fill="#1C1C1B" letter-spacing="4"
    clip-path="url(#ovalClip)">KEMTEX</text>

  <!-- Separator line (left column only) -->
  <line x1="30" y1="163" x2="283" y2="163" stroke="white" stroke-width="2.5" clip-path="url(#ovalClip)"/>

  <!-- Tagline centred in full oval width -->
  <text
    x="195" y="198"
    text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11.5" font-weight="700"
    fill="#1C1C1B" letter-spacing="1.6"
    clip-path="url(#ovalClip)">YOUR QUALITY. OUR OBSESSION</text>
</svg>
